<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resultado</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #2c2c54;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background: #6c63ff;
            color: white;
            padding: 10px;
            border-radius: 8px 8px 0 0;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f5f5ff;
        }

        .resultado {
            font-size: 16px;
            font-weight: bold;
            color: #6c63ff;
            background: #f0efff;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Datos procesados</h2>

    <table>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
        </tr>
        <tr>
            <td th:text="${persona.nombre}"></td>
            <td th:text="${persona.apellido}"></td>
            <td th:text="${persona.edad}"></td>
        </tr>
    </table>

    <p class="resultado" th:text="${tipoEdad}"></p>
</div>

</body>
</html>
